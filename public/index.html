<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Florida Aventura · Rent a Car</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Raleway:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:       #2A9D9E;
      --coral:      #E8634A;
      --cream:      #F5DFA0;
      --navy:       #1B4F72;
      --mint:       #A8E6CF;
      --pink:       #F4B8C1;
      --bg:         #FDF8EE;
      --text:       #1a1a1a;
      --bubble-bot: #ffffff;
      --bubble-usr: #2A9D9E;
      --radius:     18px;
    }

    html, body {
      height: 100%;
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── Layout wrapper ── */
    .chat-wrapper {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      box-shadow: 0 0 40px rgba(0,0,0,.12);
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--teal) 0%, var(--navy) 100%);
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .header-icon {
      width: 46px;
      height: 46px;
      background: var(--coral);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-text {}

    .header-logo {
      font-family: 'Yellowtail', cursive;
      font-size: 28px;
      color: var(--cream);
      line-height: 1;
      letter-spacing: .5px;
    }

    .header-sub {
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mint);
      margin-top: 2px;
    }

    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--mint);
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    /* ── Decorative stripe ── */
    .stripe {
      height: 4px;
      background: linear-gradient(90deg, var(--coral), var(--cream), var(--teal));
      flex-shrink: 0;
    }

    /* ── Messages area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 4px; }

    /* ── Bubbles ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end;   }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.bot .bubble {
      background: var(--bubble-bot);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .msg.user .bubble {
      background: var(--bubble-usr);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: #999;
      margin-top: 4px;
    }

    .msg.user .msg-time { text-align: right; }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      background: var(--bubble-bot);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 13px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .typing-indicator.visible { display: flex; gap: 5px; align-items: center; }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    .input-area {
      padding: 12px 14px calc(16px + env(safe-area-inset-bottom));
      background: #fff;
      border-top: 1px solid #ececec;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      border: 2px solid #e0e0e0;
      border-radius: 22px;
      padding: 10px 16px;
      font-family: 'Raleway', sans-serif;
      font-size: 16px; /* ≥16px evita zoom automático en iOS */
      resize: none;
      outline: none;
      line-height: 1.45;
      max-height: 110px;
      overflow-y: auto;
      transition: border-color .2s;
    }

    #user-input:focus { border-color: var(--teal); }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--coral);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s, transform .1s;
    }

    #send-btn:hover   { background: #d4563e; }
    #send-btn:active  { transform: scale(.93); }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }

    #send-btn svg { width: 20px; height: 20px; }

    /* ── Welcome message ── */
    .welcome {
      text-align: center;
      padding: 24px 16px 8px;
      color: #888;
      font-size: 13px;
    }

    .welcome strong {
      display: block;
      font-family: 'Yellowtail', cursive;
      font-size: 22px;
      color: var(--teal);
      margin-bottom: 4px;
    }

    /* ── Car image cards ── */
    /* ── Car listing cards (imagen + detalle unificados) ── */
    .car-listing-cards {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex-shrink: 0;
    }

    .car-listing-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.09);
    }

    .car-listing-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .car-listing-card-body {
      padding: 11px 14px 13px;
    }

    .car-listing-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
    }

    .car-listing-card-name {
      font-size: 14.5px;
      font-weight: 700;
      color: var(--navy);
      line-height: 1.25;
    }

    .car-listing-card-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.8px;
      color: var(--teal);
      border: 1.5px solid var(--teal);
      border-radius: 4px;
      padding: 2px 6px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .car-listing-card-specs {
      font-size: 12.5px;
      color: #555;
      line-height: 1.55;
      margin-bottom: 5px;
    }

    .car-listing-card-total {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--teal);
      margin-bottom: 6px;
    }

    .car-listing-card-desc {
      font-size: 12.5px;
      color: #999;
      font-style: italic;
    }

    /* ── Responsive: desktop centering ── */
    @media (min-width: 480px) {
      .chat-wrapper {
        margin: 0 auto;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <header>
    <div class="header-icon">🌴</div>
    <div class="header-text">
      <div class="header-logo">Florida Aventura</div>
      <div class="header-sub">Rent a Car · Miami</div>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      En línea
    </div>
  </header>
  <div class="stripe"></div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome">
      <strong>¡Bienvenido!</strong>
      Preguntame por nuestros autos, precios o disponibilidad.
    </div>
  </div>

  <!-- Typing indicator (inside messages flow) -->
  <div class="typing-indicator" id="typing">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Escribí tu mensaje..."
      autocomplete="off"
    ></textarea>
    <button id="send-btn" aria-label="Enviar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const typingEl    = document.getElementById('typing');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');

  // Historial en formato Anthropic
  let history = [];

  // ── Helpers ──────────────────────────────────────────────────────────────

  function now() {
    return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  }

  // ── Car listing helpers ──────────────────────────────────────────────────

  function stripMarkdown(text) {
    return text.replace(/\*\*/g, '');
  }

  function cleanCarName(raw) {
    // Agrega espacio antes del paréntesis de color: "Rogue(Negra)" → "Rogue (Negra)"
    return raw.replace(/\(([^)]+)\)/g, ' ($1)').replace(/\s+/g, ' ').trim();
  }

  function parseCarParagraph(para, images) {
    const lines = para.split('\n').map(l => l.trim()).filter(Boolean);
    const headerMatch = lines[0]?.match(/^\*\*(MEDIUM|LARGE)\s+(.+?)\*\*$/);
    if (!headerMatch) return null;

    const type     = headerMatch[1];
    const rawName  = headerMatch[2]; // ej: "Nissan Rogue(Negra) 2024"
    const imgData  = images.find(img => rawName.includes(img.name)) || null;
    const priceLine = lines.find(l => l.startsWith('💰')) || '';
    const totalLine = lines.find(l => l.startsWith('💵')) || '';
    const descLine  = lines.find(l => l.startsWith('→')) || '';

    return {
      type,
      displayName: cleanCarName(rawName),
      priceLine,
      totalLine,
      description: descLine.replace(/^→\s*/, ''),
      imageUrl: imgData?.url || null,
    };
  }

  function renderCarCard(car) {
    const card = document.createElement('div');
    card.className = 'car-listing-card';

    if (car.imageUrl) {
      const img = document.createElement('img');
      img.src = car.imageUrl;
      img.alt = car.displayName;
      img.loading = 'eager';
      card.appendChild(img);
    }

    const body = document.createElement('div');
    body.className = 'car-listing-card-body';

    const header = document.createElement('div');
    header.className = 'car-listing-card-header';
    const nameEl = document.createElement('div');
    nameEl.className = 'car-listing-card-name';
    nameEl.textContent = car.displayName;
    const badge = document.createElement('span');
    badge.className = 'car-listing-card-badge';
    badge.textContent = car.type;
    header.appendChild(nameEl);
    header.appendChild(badge);
    body.appendChild(header);

    if (car.priceLine) {
      const specs = document.createElement('div');
      specs.className = 'car-listing-card-specs';
      specs.textContent = car.priceLine;
      body.appendChild(specs);
    }

    if (car.totalLine) {
      const total = document.createElement('div');
      total.className = 'car-listing-card-total';
      total.textContent = car.totalLine;
      body.appendChild(total);
    }

    if (car.description) {
      const desc = document.createElement('div');
      desc.className = 'car-listing-card-desc';
      desc.textContent = car.description;
      body.appendChild(desc);
    }

    card.appendChild(body);
    return card;
  }

  function renderTextBubble(role, text, timestamp) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = role === 'bot' ? stripMarkdown(text) : text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = timestamp || now();

    msg.appendChild(bubble);
    msg.appendChild(time);
    messagesEl.appendChild(msg);
  }

  function addBubble(role, text, images = []) {
    const timestamp = now();

    if (role === 'bot' && images.length > 0) {
      // Separar en: intro, bloques de autos, outro
      const paragraphs = text.split(/\n\n+/);
      const carRegex = /^\*\*(MEDIUM|LARGE)\s/;
      const introParas = [], carParas = [], outroParas = [];
      let inCars = false;

      for (const para of paragraphs) {
        if (carRegex.test(para.trim())) {
          inCars = true;
          carParas.push(para.trim());
        } else if (!inCars) {
          introParas.push(para.trim());
        } else {
          outroParas.push(para.trim());
        }
      }

      if (carParas.length > 0) {
        const introText = introParas.filter(Boolean).join('\n\n');
        if (introText) renderTextBubble('bot', introText, timestamp);

        const container = document.createElement('div');
        container.className = 'car-listing-cards';
        carParas.forEach(para => {
          const car = parseCarParagraph(para, images);
          if (car) container.appendChild(renderCarCard(car));
        });
        messagesEl.appendChild(container);

        const outroText = outroParas.filter(Boolean).join('\n\n');
        if (outroText) renderTextBubble('bot', outroText, timestamp);

        requestAnimationFrame(scrollToBottom);
        return;
      }
    }

    renderTextBubble(role, text, timestamp);
    scrollToBottom();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setLoading(loading) {
    typingEl.classList.toggle('visible', loading);
    sendBtn.disabled = loading;
    inputEl.disabled = loading;
    if (loading) scrollToBottom();
  }

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
  });

  // ── Send message ─────────────────────────────────────────────────────────

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Reset input
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Show user bubble
    addBubble('user', text);

    // Add to history
    history.push({ role: 'user', content: text });

    setLoading(true);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      if (!res.ok) {
        throw new Error(`Error del servidor: ${res.status}`);
      }

      const data = await res.json();
      const botText = data.response || 'No pude obtener una respuesta.';
      const botImages = data.images || [];

      // Add to history
      history.push({ role: 'assistant', content: botText });

      setLoading(false);
      addBubble('bot', botText, botImages);

    } catch (err) {
      setLoading(false);
      addBubble('bot', 'Hubo un error al conectar con el servidor. Por favor intentá de nuevo.');
      console.error(err);
    }

    inputEl.focus();
  }

  // Send on button click
  sendBtn.addEventListener('click', sendMessage);

  // Send on Enter (Shift+Enter = nueva línea)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Focus input on load
  inputEl.focus();
</script>

</body>
</html>
