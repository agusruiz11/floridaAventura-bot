<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Florida Aventura · Rent a Car</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Raleway:wght@400;600;700&display=swap"
    rel="stylesheet"
  />
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:       #2A9D9E;
      --coral:      #E8634A;
      --cream:      #F5DFA0;
      --navy:       #1B4F72;
      --mint:       #A8E6CF;
      --pink:       #F4B8C1;
      --bg:         #FDF8EE;
      --text:       #1a1a1a;
      --bubble-bot: #ffffff;
      --bubble-usr: #2A9D9E;
      --radius:     18px;
    }

    html, body {
      height: 100%;
      font-family: 'Raleway', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* ── Layout wrapper ── */
    .chat-wrapper {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      box-shadow: 0 0 40px rgba(0,0,0,.12);
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, var(--teal) 0%, var(--navy) 100%);
      padding: 18px 20px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .header-icon {
      width: 46px;
      height: 46px;
      background: var(--coral);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-text {}

    .header-logo {
      font-family: 'Yellowtail', cursive;
      font-size: 28px;
      color: var(--cream);
      line-height: 1;
      letter-spacing: .5px;
    }

    .header-sub {
      font-family: 'Raleway', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--mint);
      margin-top: 2px;
    }

    .header-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--mint);
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--mint);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    /* ── Decorative stripe ── */
    .stripe {
      height: 4px;
      background: linear-gradient(90deg, var(--coral), var(--cream), var(--teal));
      flex-shrink: 0;
    }

    /* ── Messages area ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--teal); border-radius: 4px; }

    /* ── Bubbles ── */
    .msg {
      display: flex;
      flex-direction: column;
      max-width: 82%;
    }

    .msg.bot  { align-self: flex-start; }
    .msg.user { align-self: flex-end;   }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      line-height: 1.55;
      font-size: 14.5px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.bot .bubble {
      background: var(--bubble-bot);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .msg.user .bubble {
      background: var(--bubble-usr);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg-time {
      font-size: 10px;
      color: #999;
      margin-top: 4px;
    }

    .msg.user .msg-time { text-align: right; }

    /* ── Typing indicator ── */
    .typing-indicator {
      display: none;
      align-self: flex-start;
      background: var(--bubble-bot);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 13px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .typing-indicator.visible { display: flex; gap: 5px; align-items: center; }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--teal);
      animation: bounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: .2s; }
    .typing-dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40%            { transform: translateY(-6px); }
    }

    /* ── Input area ── */
    .input-area {
      padding: 12px 14px 16px;
      background: #fff;
      border-top: 1px solid #ececec;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }

    #user-input {
      flex: 1;
      border: 2px solid #e0e0e0;
      border-radius: 22px;
      padding: 10px 16px;
      font-family: 'Raleway', sans-serif;
      font-size: 14px;
      resize: none;
      outline: none;
      line-height: 1.45;
      max-height: 110px;
      overflow-y: auto;
      transition: border-color .2s;
    }

    #user-input:focus { border-color: var(--teal); }

    #send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--coral);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .2s, transform .1s;
    }

    #send-btn:hover   { background: #d4563e; }
    #send-btn:active  { transform: scale(.93); }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }

    #send-btn svg { width: 20px; height: 20px; }

    /* ── Welcome message ── */
    .welcome {
      text-align: center;
      padding: 24px 16px 8px;
      color: #888;
      font-size: 13px;
    }

    .welcome strong {
      display: block;
      font-family: 'Yellowtail', cursive;
      font-size: 22px;
      color: var(--teal);
      margin-bottom: 4px;
    }

    /* ── Responsive: desktop centering ── */
    @media (min-width: 480px) {
      .chat-wrapper {
        margin: 0 auto;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>

<div class="chat-wrapper">

  <!-- Header -->
  <header>
    <div class="header-icon">🌴</div>
    <div class="header-text">
      <div class="header-logo">Florida Aventura</div>
      <div class="header-sub">Rent a Car · Miami</div>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      En línea
    </div>
  </header>
  <div class="stripe"></div>

  <!-- Messages -->
  <div class="messages" id="messages">
    <div class="welcome">
      <strong>¡Bienvenido!</strong>
      Preguntame por nuestros autos, precios o disponibilidad.
    </div>
  </div>

  <!-- Typing indicator (inside messages flow) -->
  <div class="typing-indicator" id="typing">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea
      id="user-input"
      rows="1"
      placeholder="Escribí tu mensaje..."
      autocomplete="off"
    ></textarea>
    <button id="send-btn" aria-label="Enviar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>

</div>

<script>
  const messagesEl  = document.getElementById('messages');
  const typingEl    = document.getElementById('typing');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');

  // Historial en formato Anthropic
  let history = [];

  // ── Helpers ──────────────────────────────────────────────────────────────

  function now() {
    return new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
  }

  function addBubble(role, text) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const time = document.createElement('div');
    time.className = 'msg-time';
    time.textContent = now();

    msg.appendChild(bubble);
    msg.appendChild(time);
    messagesEl.appendChild(msg);
    scrollToBottom();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function setLoading(loading) {
    typingEl.classList.toggle('visible', loading);
    sendBtn.disabled = loading;
    inputEl.disabled = loading;
    if (loading) scrollToBottom();
  }

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
  });

  // ── Send message ─────────────────────────────────────────────────────────

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    // Reset input
    inputEl.value = '';
    inputEl.style.height = 'auto';

    // Show user bubble
    addBubble('user', text);

    // Add to history
    history.push({ role: 'user', content: text });

    setLoading(true);

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });

      if (!res.ok) {
        throw new Error(`Error del servidor: ${res.status}`);
      }

      const data = await res.json();
      const botText = data.response || 'No pude obtener una respuesta.';

      // Add to history
      history.push({ role: 'assistant', content: botText });

      setLoading(false);
      addBubble('bot', botText);

    } catch (err) {
      setLoading(false);
      addBubble('bot', 'Hubo un error al conectar con el servidor. Por favor intentá de nuevo.');
      console.error(err);
    }

    inputEl.focus();
  }

  // Send on button click
  sendBtn.addEventListener('click', sendMessage);

  // Send on Enter (Shift+Enter = nueva línea)
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Focus input on load
  inputEl.focus();
</script>

</body>
</html>
